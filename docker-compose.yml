name: intrap-api

services:
  intrap-api:
    build: .
    container_name: intrap-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "3200:3200"

  db:
    image: postgres:16-alpine
    container_name: intrap_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
