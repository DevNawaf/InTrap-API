version: "3.9"

services:
  intrap-api:
    build: .
    container_name: intrap-api
    restart: unless-stopped
    environment: 
      - PORT=3200
      - NODE_ENV=production
      - POSTGRES_USER=apiuser
      - POSTGRES_PASSWORD=StrongApiPass2025
      - POSTGRES_DB=intrap
      - POSTGRES_HOST=root-postgres-1
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://apiuser:StrongApiPass2025@root-postgres-1:5432/intrap
    networks:
      - root_default
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.intrap-api-v1.rule=Host(`intrap-api.sanadais.com`) && (PathPrefix(`/api/v1`) || Path(`/api/v1`))"
      - "traefik.http.routers.intrap-api-v1.priority=1000"
      - "traefik.http.routers.intrap-api-v1.entrypoints=websecure"
      - "traefik.http.routers.intrap-api-v1.tls.certresolver=letsencrypt"
      - "traefik.http.routers.intrap-api-v1.service=intrap-api-v1-svc"
      - "traefik.http.services.intrap-api-v1-svc.loadbalancer.server.port=3200"
      - "traefik.docker.network=web"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3200/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  root_default:
    external: true
  web:
    external: true
