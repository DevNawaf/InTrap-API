version: "3.9"

services:
  intrap-api:
    build: .
    container_name: intrap-api
    restart: unless-stopped
    environment:
      - PORT=3200
      - NODE_ENV=production
      - POSTGRES_USER=apiuser
      - POSTGRES_PASSWORD=StrongApiPass2025
      - POSTGRES_DB=intrap
      - POSTGRES_HOST=root-postgres-1
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://apiuser:StrongApiPass2025@root-postgres-1:5432/intrap
    networks:
      - root_default
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.intrap-api.rule=(Host(`intrap.sanadais.com`) || Host(`sanadais.com`)) && PathPrefix(`/intrap/api/v1`)"
      - "traefik.http.routers.intrap-api.priority=100"
      - "traefik.http.routers.intrap-api.entrypoints=websecure"
      - "traefik.http.routers.intrap-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.intrap-api.loadbalancer.server.port=3200"
      - "traefik.docker.network=web"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3200/intrap/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  root_default:
    external: true
  web:
    external: true
